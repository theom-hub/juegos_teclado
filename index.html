<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Teclado Aventura! 🚀</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Nunito',sans-serif; overflow:hidden; background:#87CEEB; height:100vh; width:100vw; user-select:none; }

  .screen { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .screen.hidden { display:none; }

  /* ── INICIO ── */
  #screen-start { background:linear-gradient(180deg,#5BC8F5 0%,#CCF0FF 58%,#66BB6A 58%,#4CAF50 100%); }

  .title-box {
    background:rgba(255,255,255,0.94); border-radius:32px; padding:18px 48px;
    box-shadow:0 8px 32px rgba(0,0,0,0.18); text-align:center; margin-bottom:22px; border:4px solid #FFD700;
  }
  .title-box h1 { font-family:'Fredoka One',cursive; font-size:3rem; color:#FF4500; text-shadow:3px 3px 0 #FFD700; line-height:1.1; }
  .title-box p  { font-size:1.1rem; color:#555; margin-top:5px; font-weight:700; }

  .pick-label { font-family:'Fredoka One',cursive; font-size:1.55rem; color:#fff; text-shadow:2px 2px 5px rgba(0,0,0,0.4); margin-bottom:16px; }

  .char-selection { display:flex; gap:20px; margin-bottom:20px; }

  .char-card {
    background:rgba(255,255,255,0.94); border-radius:24px; padding:16px 20px;
    cursor:pointer; text-align:center; border:4px solid transparent;
    box-shadow:0 6px 20px rgba(0,0,0,0.15);
    transition:transform .2s, border-color .2s, box-shadow .2s; min-width:130px;
  }
  .char-card:hover { transform:translateY(-10px) scale(1.06); border-color:#FFD700; box-shadow:0 14px 32px rgba(0,0,0,0.22); }
  .char-card canvas { display:block; margin:0 auto 6px; }
  .char-card h3 { font-family:'Fredoka One',cursive; font-size:1.4rem; color:#333; }
  .char-card .wtag {
    font-size:0.75rem; font-weight:800; color:#888; margin-top:3px;
    background:#f0f0f0; border-radius:20px; padding:2px 8px; display:inline-block;
  }

  .instruction { font-family:'Fredoka One',cursive; font-size:1.3rem; color:#fff; text-shadow:2px 2px 4px rgba(0,0,0,0.35); animation:pulse 1.6s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }

  /* ── JUEGO ── */
  #screen-game { background:none; }
  #gameCanvas { display:block; width:100vw; height:100vh; }

  #hud {
    position:absolute; top:16px; right:20px;
    background:rgba(255,255,255,0.88); border-radius:18px; padding:9px 20px;
    box-shadow:0 4px 16px rgba(0,0,0,0.18); border:3px solid #FFD700; text-align:center; min-width:114px;
  }
  #hud .label { font-size:.78rem; font-weight:800; color:#aaa; text-transform:uppercase; letter-spacing:1px; }
  #hud .score-val { font-family:'Fredoka One',cursive; font-size:2.4rem; color:#FF4500; line-height:1; }
  #hud .lives { font-size:1.25rem; margin-top:3px; }

  #level-display {
    position:absolute; top:16px; left:20px;
    background:rgba(255,255,255,0.88); border-radius:18px; padding:9px 16px;
    box-shadow:0 4px 16px rgba(0,0,0,0.18); border:3px solid #4CAF50;
    font-family:'Fredoka One',cursive; font-size:1.2rem; color:#388E3C;
  }

  /* ── GAME OVER ── */
  #screen-gameover { background:linear-gradient(180deg,#5BC8F5 0%,#CCF0FF 58%,#66BB6A 58%,#4CAF50 100%); }
  .gameover-box { background:rgba(255,255,255,0.96); border-radius:30px; padding:34px 52px; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,0.2); border:4px solid #FFD700; max-width:460px; }
  .gameover-box h2 { font-family:'Fredoka One',cursive; font-size:2.6rem; color:#FF4500; text-shadow:2px 2px 0 #FFD700; }
  .gameover-box .final-score { font-family:'Fredoka One',cursive; font-size:1.85rem; color:#333; margin:12px 0; }
  .gameover-box .final-score span { color:#4CAF50; font-size:2.6rem; }
  .gameover-box .emoji-big { font-size:3.5rem; margin-bottom:6px; display:block; }
  .btn-play { background:linear-gradient(135deg,#4CAF50,#388E3C); color:#fff; border:none; border-radius:50px; padding:12px 40px; font-family:'Fredoka One',cursive; font-size:1.6rem; cursor:pointer; box-shadow:0 6px 20px rgba(76,175,80,0.5); transition:transform .15s,box-shadow .15s; margin-top:14px; }
  .btn-play:hover { transform:scale(1.07); box-shadow:0 10px 28px rgba(76,175,80,0.6); }

  .hit-msg { position:absolute; font-family:'Fredoka One',cursive; font-size:1.8rem; color:#FFD700; text-shadow:2px 2px 0 #FF4500; pointer-events:none; animation:floatUp .9s ease-out forwards; z-index:999; }
  @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(1.4)} }

  .particle { position:absolute; pointer-events:none; animation:pAnim .7s ease-out forwards; z-index:999; }
  @keyframes pAnim { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(0) translateY(-20px)} }
</style>
</head>
<body>

<!-- ══ INICIO ══ -->
<div id="screen-start" class="screen">
  <div class="title-box">
    <h1>⌨️ Teclado Aventura!</h1>
    <p>Aprendé el teclado jugando 🎉</p>
  </div>
  <p class="pick-label">¡Elegí tu personaje!</p>
  <div class="char-selection">
    <div class="char-card" onclick="startGame('robot')">
      <canvas id="prev-robot" width="88" height="110"></canvas>
      <h3>Robot</h3>
      <div class="wtag">🔴 Pistola Láser</div>
    </div>
    <div class="char-card" onclick="startGame('astronaut')">
      <canvas id="prev-astronaut" width="88" height="110"></canvas>
      <h3>Astronauta</h3>
      <div class="wtag">🔵 Pistola Láser</div>
    </div>
    <div class="char-card" onclick="startGame('monster')">
      <canvas id="prev-monster" width="88" height="110"></canvas>
      <h3>Monstruo</h3>
      <div class="wtag">💚 Bolas de Slime</div>
    </div>
  </div>
  <p class="instruction">¡Apretá las letras que caen!</p>
</div>

<!-- ══ JUEGO ══ -->
<div id="screen-game" class="screen hidden">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div class="label">Puntos</div>
    <div class="score-val" id="score-display">0</div>
    <div class="lives" id="lives-display">❤️❤️❤️</div>
  </div>
  <div id="level-display">⭐ Nivel <span id="level-num">1</span></div>
</div>

<!-- ══ GAME OVER ══ -->
<div id="screen-gameover" class="screen hidden">
  <div class="gameover-box">
    <span class="emoji-big" id="gameover-emoji">🎉</span>
    <h2 id="gameover-title">¡Fin del juego!</h2>
    <div class="final-score">Tu puntaje: <span id="final-score">0</span></div>
    <p style="color:#666;font-size:1rem;" id="gameover-msg">¡Seguí practicando!</p>
    <button class="btn-play" onclick="showStart()">🏠 Volver al inicio</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CANVAS & RESIZE
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════════
let selectedChar = 'robot';
let score=0, lives=3, level=1;
let fallingLetters=[], projectiles=[];
let gameRunning=false;
let frameCount=0, lastSpawnFrame=0;
let spawnInterval=90, letterSpeed=1.2;
let charAnim=0, shootAnim=0;

// ═══════════════════════════════════════════════════════════
// ESCENARIO JARDÍN
// ═══════════════════════════════════════════════════════════
const clouds=[{x:.09,y:.07,s:1.2},{x:.33,y:.04,s:.9},{x:.60,y:.09,s:1.4},{x:.82,y:.05,s:1.0}];
const fColors=['#FF69B4','#FF6347','#9370DB','#FF8C00','#FF1493'];
let flowers=[];
function genFlowers(){
  flowers=[];
  for(let i=0;i<32;i++) flowers.push({
    x:(i/31)*1.06-.03+(Math.random()-.5)*.025,
    yOff:Math.random()*.025,
    color:fColors[i%fColors.length],
    size:.011+Math.random()*.007,
    type:i%3
  });
}
genFlowers();
const trees=[{x:.05,sz:.17},{x:.89,sz:.19},{x:.79,sz:.14}];

function drawBG(){
  let sk=ctx.createLinearGradient(0,0,0,H*.62);
  sk.addColorStop(0,'#4FC3F7'); sk.addColorStop(1,'#B3E5FC');
  ctx.fillStyle=sk; ctx.fillRect(0,0,W,H*.62);

  // Sol
  const sx=W*.87,sy=H*.12,sr=W*.048;
  ctx.save();
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=3;
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(sx+Math.cos(a)*sr*1.25,sy+Math.sin(a)*sr*1.25);
    ctx.lineTo(sx+Math.cos(a)*sr*1.72,sy+Math.sin(a)*sr*1.72); ctx.stroke();
  }
  let sg=ctx.createRadialGradient(sx,sy,0,sx,sy,sr);
  sg.addColorStop(0,'#FFF9C4'); sg.addColorStop(1,'#FFD700');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
  ctx.font=`${sr*1.1}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('😊',sx,sy);
  ctx.restore();

  clouds.forEach(c=>drawCloud(W*c.x,H*c.y,c.s));

  ctx.fillStyle='#A5D6A7';
  ctx.beginPath(); ctx.moveTo(0,H*.56);
  ctx.bezierCurveTo(W*.2,H*.39,W*.4,H*.46,W*.5,H*.42);
  ctx.bezierCurveTo(W*.62,H*.38,W*.8,H*.50,W,H*.50);
  ctx.lineTo(W,H*.62); ctx.lineTo(0,H*.62); ctx.closePath(); ctx.fill();

  let gg=ctx.createLinearGradient(0,H*.60,0,H);
  gg.addColorStop(0,'#66BB6A'); gg.addColorStop(.28,'#4CAF50'); gg.addColorStop(1,'#388E3C');
  ctx.fillStyle=gg; ctx.fillRect(0,H*.60,W,H*.40);
  ctx.fillStyle='#5D4037'; ctx.fillRect(0,H*.90,W,H*.10);

  ctx.fillStyle='#D7B88A';
  ctx.beginPath(); ctx.moveTo(W*.37,H*.60); ctx.lineTo(W*.63,H*.60);
  ctx.lineTo(W*.70,H); ctx.lineTo(W*.30,H); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#C8A96E'; ctx.lineWidth=3; ctx.setLineDash([16,16]);
  ctx.beginPath(); ctx.moveTo(W*.5,H*.63); ctx.lineTo(W*.5,H*.92); ctx.stroke();
  ctx.setLineDash([]);

  trees.forEach(t=>drawTree(W*t.x,H*.62,t.sz));
  flowers.forEach(f=>drawFlower(W*f.x,H*(0.62+f.yOff)+H*.03,W*f.size,f.color,f.type));
  drawBush(W*.14,H*.73); drawBush(W*.73,H*.71);
}

function drawCloud(x,y,s){
  ctx.save(); ctx.fillStyle='rgba(255,255,255,0.92)';
  ctx.shadowColor='rgba(100,180,255,0.2)'; ctx.shadowBlur=8;
  const r=26*s;
  [[0,0],[r*.85,r*.2],[r*1.65,0],[r*.82,-r*.32],[r*.38,-r*.36]].forEach(([dx,dy])=>{
    ctx.beginPath(); ctx.arc(x+dx-r*.82,y+dy,r,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function drawTree(x,y,sz){
  const tw=W*sz,th=H*sz*1.8;
  ctx.fillStyle='#6D4C41'; ctx.fillRect(x-tw*.1,y-th*.38,tw*.2,th*.38);
  [[-tw*.32,-th*.48,tw*.44],[tw*.32,-th*.50,tw*.44],[0,-th*.68,tw*.55]].forEach(([dx,dy,r],i)=>{
    let g=ctx.createRadialGradient(x+dx,y+dy,0,x+dx,y+dy,r);
    g.addColorStop(0,'#81C784'); g.addColorStop(1,['#388E3C','#43A047','#2E7D32'][i]);
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x+dx,y+dy,r,0,Math.PI*2); ctx.fill();
  });
}

function drawFlower(x,y,size,color,type){
  const r=size; ctx.save();
  ctx.strokeStyle='#388E3C'; ctx.lineWidth=r*.3;
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+r*2.5); ctx.stroke();
  const n=type===0?5:type===1?6:4;
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    ctx.fillStyle=color; ctx.beginPath();
    ctx.ellipse(x+Math.cos(a)*r,y+Math.sin(a)*r,r*.65,r*.38,a,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(x,y,r*.48,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawBush(x,y){
  const r=W*.033; ctx.fillStyle='#388E3C';
  [[-r*.5,0,r],[r*.5,0,r*.88],[0,-r*.38,r*.78]].forEach(([dx,dy,rad])=>{
    ctx.beginPath(); ctx.arc(x+dx,y+dy,rad,0,Math.PI*2); ctx.fill();
  });
}

// ═══════════════════════════════════════════════════════════
// PERSONAJES
// ═══════════════════════════════════════════════════════════
function drawCharToCtx(c,char,s,sh){
  if(char==='robot')       drawRobot(c,s,sh);
  else if(char==='astronaut') drawAstronaut(c,s,sh);
  else                        drawMonster(c,s,sh);
}

/* ── ROBOT ── */
function drawRobot(c,s,sh){
  c.fillStyle='rgba(0,0,0,0.13)';
  c.beginPath(); c.ellipse(0,s*.02,s*.32,s*.07,0,0,Math.PI*2); c.fill();
  // Piernas
  c.fillStyle='#546E7A'; c.fillRect(-s*.22,-s*.43,s*.16,s*.45); c.fillRect(s*.06,-s*.43,s*.16,s*.45);
  // Pies
  c.fillStyle='#37474F';
  c.beginPath(); c.roundRect(-s*.26,-s*.02,s*.22,s*.07,s*.03); c.fill();
  c.beginPath(); c.roundRect(s*.04,-s*.02,s*.22,s*.07,s*.03); c.fill();
  // Cuerpo
  c.fillStyle='#607D8B'; c.beginPath(); c.roundRect(-s*.30,-s*.90,s*.60,s*.52,s*.08); c.fill();
  // Placa pecho
  c.fillStyle='#455A64'; c.beginPath(); c.roundRect(-s*.18,-s*.82,s*.36,s*.28,s*.05); c.fill();
  // Luces de colores
  [['#F44336',-s*.10,-s*.76],['#FFEB3B',0,-s*.76],['#4CAF50',s*.10,-s*.76]].forEach(([col,bx,by])=>{
    c.fillStyle=col; c.beginPath(); c.arc(bx,by,s*.04,0,Math.PI*2); c.fill();
  });
  c.strokeStyle='#546E7A'; c.lineWidth=s*.02;
  c.beginPath(); c.moveTo(-s*.18,-s*.62); c.lineTo(s*.18,-s*.62); c.stroke();
  // Brazos
  c.fillStyle='#607D8B';
  if(sh){
    c.fillRect(-s*.46,-s*.88,s*.17,s*.14);
    c.fillRect(s*.29,-s*.96,s*.17,s*.14);
  } else {
    c.fillRect(-s*.46,-s*.88,s*.16,s*.44);
    c.fillRect(s*.30,-s*.88,s*.16,s*.44);
  }
  // Manos
  c.fillStyle='#455A64';
  const rhy=sh?-s*.84:-s*.47;
  const lhy=sh?-s*.92:-s*.47;
  c.beginPath(); c.arc(-s*.38,rhy,s*.07,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(s*.38,lhy,s*.07,0,Math.PI*2); c.fill();
  // Pistola laser roja
  drawLaserGun(c,s*.38,lhy,s,sh,'#FF1744');
  // Cabeza
  c.fillStyle='#78909C'; c.beginPath(); c.roundRect(-s*.28,-s*1.27,s*.56,s*.40,s*.08); c.fill();
  // Antena
  c.strokeStyle='#90A4AE'; c.lineWidth=s*.03;
  c.beginPath(); c.moveTo(0,-s*1.27); c.lineTo(0,-s*1.46); c.stroke();
  c.fillStyle='#F44336'; c.beginPath(); c.arc(0,-s*1.47,s*.05,0,Math.PI*2); c.fill();
  // Visor
  c.fillStyle='#1A237E'; c.beginPath(); c.roundRect(-s*.21,-s*1.22,s*.42,s*.22,s*.05); c.fill();
  // Ojos LED rojos
  c.fillStyle='#FF1744';
  c.beginPath(); c.arc(-s*.10,-s*1.11,s*.065,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(s*.10,-s*1.11,s*.065,0,Math.PI*2); c.fill();
  c.fillStyle='rgba(255,255,255,.7)';
  c.beginPath(); c.arc(-s*.075,-s*1.13,s*.022,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(s*.125,-s*1.13,s*.022,0,Math.PI*2); c.fill();
  // Boca
  c.fillStyle='#455A64'; c.beginPath(); c.roundRect(-s*.14,-s*.96,s*.28,s*.07,s*.03); c.fill();
  c.fillStyle='#B0BEC5';
  for(let i=0;i<4;i++){ c.beginPath(); c.rect(-s*.13+i*s*.07,-s*.95,s*.05,s*.05); c.fill(); }
}

/* ── ASTRONAUTA ── */
function drawAstronaut(c,s,sh){
  c.fillStyle='rgba(0,0,0,0.13)';
  c.beginPath(); c.ellipse(0,s*.02,s*.32,s*.07,0,0,Math.PI*2); c.fill();
  // Botas
  c.fillStyle='#37474F';
  c.beginPath(); c.roundRect(-s*.24,-s*.02,s*.20,s*.07,s*.03); c.fill();
  c.beginPath(); c.roundRect(s*.04,-s*.02,s*.20,s*.07,s*.03); c.fill();
  // Piernas traje
  c.fillStyle='#ECEFF1';
  c.beginPath(); c.roundRect(-s*.22,-s*.44,s*.17,s*.44,s*.05); c.fill();
  c.beginPath(); c.roundRect(s*.05,-s*.44,s*.17,s*.44,s*.05); c.fill();
  c.strokeStyle='#B0BEC5'; c.lineWidth=s*.025;
  c.beginPath(); c.moveTo(-s*.22,-s*.22); c.lineTo(-s*.05,-s*.22); c.stroke();
  c.beginPath(); c.moveTo(s*.05,-s*.22); c.lineTo(s*.22,-s*.22); c.stroke();
  // Mochila
  c.fillStyle='#90A4AE'; c.beginPath(); c.roundRect(-s*.12,-s*.92,s*.24,s*.46,s*.06); c.fill();
  c.fillStyle='#FF7043';
  [[-s*.07,-s*.47],[s*.07,-s*.47]].forEach(([fx,fy])=>{
    c.beginPath(); c.moveTo(fx-s*.04,fy); c.lineTo(fx+s*.04,fy); c.lineTo(fx,fy+s*.10); c.closePath(); c.fill();
  });
  // Cuerpo traje
  c.fillStyle='#FAFAFA'; c.beginPath(); c.roundRect(-s*.30,-s*.92,s*.60,s*.52,s*.10); c.fill();
  c.fillStyle='#1565C0'; c.beginPath(); c.roundRect(-s*.16,-s*.84,s*.32,s*.26,s*.04); c.fill();
  c.fillStyle='#fff'; c.font=`bold ${s*.09}px Fredoka One,cursive`;
  c.textAlign='center'; c.textBaseline='middle'; c.fillText('NASA',0,-s*.71);
  c.strokeStyle='#B0BEC5'; c.lineWidth=s*.025;
  c.beginPath(); c.moveTo(-s*.28,-s*.54); c.lineTo(s*.28,-s*.54); c.stroke();
  // Brazos
  c.fillStyle='#ECEFF1';
  const aly=sh?-s*.92:-s*.46;
  if(sh){
    c.beginPath(); c.roundRect(-s*.46,-s*.88,s*.17,s*.14,s*.06); c.fill();
    c.beginPath(); c.roundRect(s*.29,-s*.96,s*.17,s*.14,s*.06); c.fill();
  } else {
    c.beginPath(); c.roundRect(-s*.46,-s*.88,s*.17,s*.44,s*.06); c.fill();
    c.beginPath(); c.roundRect(s*.29,-s*.88,s*.17,s*.44,s*.06); c.fill();
  }
  // Guantes
  c.fillStyle='#90A4AE';
  c.beginPath(); c.arc(-s*.38,sh?-s*.84:-s*.46,s*.07,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(s*.38,aly,s*.07,0,Math.PI*2); c.fill();
  // Pistola laser celeste
  drawLaserGun(c,s*.38,aly,s,sh,'#00E5FF');
  // Casco
  c.fillStyle='#FAFAFA'; c.beginPath(); c.arc(0,-s*1.10,s*.30,0,Math.PI*2); c.fill();
  c.strokeStyle='#CFD8DC'; c.lineWidth=s*.03; c.stroke();
  let visor=c.createRadialGradient(-s*.06,-s*1.15,0,-s*.04,-s*1.13,s*.20);
  visor.addColorStop(0,'rgba(100,200,255,0.9)'); visor.addColorStop(1,'rgba(0,80,180,0.85)');
  c.fillStyle=visor; c.beginPath(); c.ellipse(0,-s*1.10,s*.20,s*.18,0,0,Math.PI*2); c.fill();
  c.fillStyle='rgba(255,255,255,.5)';
  c.beginPath(); c.ellipse(-s*.08,-s*1.18,s*.07,s*.05,-.5,0,Math.PI*2); c.fill();
  // Cara dentro del visor
  c.fillStyle='#FFCC80'; c.beginPath(); c.arc(0,-s*1.10,s*.13,0,Math.PI*2); c.fill();
  c.fillStyle='#333';
  c.beginPath(); c.arc(-s*.055,-s*1.13,s*.03,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(s*.055,-s*1.13,s*.03,0,Math.PI*2); c.fill();
  c.strokeStyle='#333'; c.lineWidth=s*.022;
  c.beginPath(); c.arc(0,-s*1.05,s*.06,.1,Math.PI-.1); c.stroke();
}

/* ── MONSTRUO ── */
function drawMonster(c,s,sh){
  c.fillStyle='rgba(0,0,0,0.13)';
  c.beginPath(); c.ellipse(0,s*.02,s*.36,s*.08,0,0,Math.PI*2); c.fill();
  // Piernas
  c.fillStyle='#558B2F';
  c.beginPath(); c.roundRect(-s*.24,-s*.38,s*.20,s*.42,s*.07); c.fill();
  c.beginPath(); c.roundRect(s*.04,-s*.38,s*.20,s*.42,s*.07); c.fill();
  // Pies con garras
  [[-s*.26,-s*.02],[s*.02,-s*.02]].forEach(([fx,fy])=>{
    c.fillStyle='#33691E'; c.beginPath(); c.roundRect(fx,fy,s*.26,s*.07,s*.03); c.fill();
    [-s*.04,s*.04,s*.12].forEach(gx=>{
      c.fillStyle='#1B5E20'; c.beginPath(); c.arc(fx+gx+s*.09,fy+s*.08,s*.035,0,Math.PI); c.fill();
    });
  });
  // Cuerpo
  c.fillStyle='#7CB342'; c.beginPath(); c.ellipse(0,-s*.58,s*.38,s*.44,0,0,Math.PI*2); c.fill();
  c.fillStyle='#AED581'; c.beginPath(); c.ellipse(0,-s*.50,s*.22,s*.28,0,0,Math.PI*2); c.fill();
  // Brazos
  c.fillStyle='#7CB342';
  const mhy=sh?-s*.55:-s*.42;
  if(sh){
    c.beginPath(); c.roundRect(-s*.55,-s*.82,s*.20,s*.30,s*.07); c.fill();
    c.beginPath(); c.roundRect(s*.35,-s*.90,s*.20,s*.30,s*.07); c.fill();
  } else {
    c.beginPath(); c.roundRect(-s*.56,-s*.85,s*.20,s*.46,s*.07); c.fill();
    c.beginPath(); c.roundRect(s*.36,-s*.85,s*.20,s*.46,s*.07); c.fill();
  }
  // Manos con garras
  [[-s*.46,mhy],[s*.46,mhy]].forEach(([hx,hy])=>{
    c.fillStyle='#558B2F'; c.beginPath(); c.arc(hx,hy,s*.10,0,Math.PI*2); c.fill();
    for(let i=0;i<3;i++){
      const a=(i/2-.5)*1.2;
      c.fillStyle='#33691E'; c.beginPath();
      c.arc(hx+Math.cos(a-Math.PI/2)*s*.12,hy+Math.sin(a-Math.PI/2)*s*.12,s*.04,0,Math.PI*2); c.fill();
    }
  });
  // Lanzador de slime
  drawSlimeLauncher(c,s*.46,mhy,s,sh);
  // Cabeza
  c.fillStyle='#8BC34A'; c.beginPath(); c.ellipse(0,-s*1.06,s*.34,s*.30,0,0,Math.PI*2); c.fill();
  // Cuernos
  c.fillStyle='#558B2F';
  [[-s*.22,-s*1.30],[s*.22,-s*1.30]].forEach(([kx,ky])=>{
    c.beginPath(); c.moveTo(kx,ky+s*.10); c.lineTo(kx-s*.06,ky); c.lineTo(kx+s*.06,ky); c.closePath(); c.fill();
  });
  // Ojos
  c.fillStyle='#FFEB3B';
  c.beginPath(); c.arc(-s*.12,-s*1.10,s*.10,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(s*.12,-s*1.10,s*.10,0,Math.PI*2); c.fill();
  c.fillStyle='#212121';
  c.beginPath(); c.arc(-s*.12,-s*1.10,s*.055,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(s*.12,-s*1.10,s*.055,0,Math.PI*2); c.fill();
  c.fillStyle='#fff';
  c.beginPath(); c.arc(-s*.10,-s*1.12,s*.02,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(s*.14,-s*1.12,s*.02,0,Math.PI*2); c.fill();
  // Boca con dientes
  c.fillStyle='#33691E'; c.beginPath(); c.arc(0,-s*.92,s*.14,0,Math.PI); c.fill();
  c.fillStyle='#fff';
  [[-s*.08,-s*.90],[0,-s*.90],[s*.08,-s*.90]].forEach(([tx,ty])=>{
    c.beginPath(); c.moveTo(tx-s*.04,ty); c.lineTo(tx+s*.04,ty); c.lineTo(tx,ty+s*.08); c.closePath(); c.fill();
  });
}

/* ── ARMAS ── */
function drawLaserGun(c,hx,hy,s,sh,color){
  c.save(); c.translate(hx,hy);
  if(sh) c.rotate(-Math.PI*.30);
  // Cuerpo de la pistola
  c.fillStyle='#212121'; c.beginPath(); c.roundRect(-s*.02,-s*.055,s*.30,s*.085,s*.025); c.fill();
  // Empuñadura
  c.fillStyle='#424242'; c.beginPath(); c.roundRect(s*.02,s*.03,s*.08,s*.10,s*.02); c.fill();
  // Cañón
  c.fillStyle='#616161'; c.beginPath(); c.roundRect(s*.20,-s*.03,s*.14,s*.05,s*.015); c.fill();
  // Línea de energía
  c.fillStyle=color; c.beginPath(); c.rect(s*.05,-s*.030,s*.12,s*.028); c.fill();
  // Punta brillante
  c.shadowColor=color; c.shadowBlur=10;
  c.fillStyle=color; c.beginPath(); c.arc(s*.34,0,s*.036,0,Math.PI*2); c.fill();
  c.restore();
}

function drawSlimeLauncher(c,hx,hy,s,sh){
  c.save(); c.translate(hx,hy);
  if(sh) c.rotate(-Math.PI*.30);
  // Cuerpo
  c.fillStyle='#1B5E20'; c.beginPath(); c.roundRect(-s*.02,-s*.06,s*.28,s*.11,s*.045); c.fill();
  c.fillStyle='#33691E'; c.beginPath(); c.roundRect(s*.02,-s*.048,s*.20,s*.09,s*.035); c.fill();
  // Depósito de slime visible
  c.fillStyle='#7CB342'; c.beginPath(); c.arc(s*.06,-s*.005,s*.07,0,Math.PI*2); c.fill();
  c.fillStyle='#AED581'; c.beginPath(); c.arc(s*.06,-s*.005,s*.04,0,Math.PI*2); c.fill();
  // Boca del cañón con slime goteando
  c.fillStyle='#4CAF50'; c.beginPath(); c.arc(s*.28,0,s*.05,0,Math.PI*2); c.fill();
  c.fillStyle='rgba(180,255,100,0.7)'; c.beginPath(); c.arc(s*.28,-s*.01,s*.025,0,Math.PI*2); c.fill();
  c.restore();
}

function drawCharacter(x,y){
  const s=H*.17;
  charAnim+=.05;
  const bob=Math.sin(charAnim)*3;
  ctx.save(); ctx.translate(x,y+bob);
  drawCharToCtx(ctx,selectedChar,s,shootAnim>0);
  ctx.restore();
  if(shootAnim>0) shootAnim--;
}

function drawPreviews(){
  [['robot','prev-robot'],['astronaut','prev-astronaut'],['monster','prev-monster']].forEach(([char,id])=>{
    const pc=document.getElementById(id);
    if(!pc) return;
    const pctx=pc.getContext('2d');
    pctx.clearRect(0,0,88,110);
    pctx.save(); pctx.translate(44,102);
    drawCharToCtx(pctx,char,76,false);
    pctx.restore();
  });
}

// ═══════════════════════════════════════════════════════════
// LETRAS QUE CAEN — SIN ROTACIÓN
// ═══════════════════════════════════════════════════════════
const LETTERS='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const lColors=['#E53935','#1E88E5','#2E7D32','#6A1B9A','#F57F17','#00838F','#AD1457','#4527A0','#BF360C','#1565C0','#558B2F','#FF6F00'];

function spawnLetter(){
  const letter=LETTERS[Math.floor(Math.random()*LETTERS.length)];
  const color=lColors[Math.floor(Math.random()*lColors.length)];
  const x=W*.10+Math.random()*W*.80;
  fallingLetters.push({
    letter, color, x, y:-70,
    speed: letterSpeed+Math.random()*.6,
    size: H*.075,
    hit: false, hitAnim: 0
    // ★ Sin rotation ni rotSpeed — letras siempre rectas
  });
}

function drawFallingLetter(fl){
  ctx.save();
  ctx.translate(fl.x, fl.y);
  // ★ NO ctx.rotate() → M nunca se confunde con W

  if(fl.hit){
    const sc=1+fl.hitAnim*.35;
    ctx.scale(sc,sc);
    ctx.globalAlpha=1-fl.hitAnim;
  }

  ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=10; ctx.shadowOffsetY=4;
  // Burbuja de color
  ctx.fillStyle=fl.color;
  ctx.beginPath(); ctx.roundRect(-fl.size*.44,-fl.size*.52,fl.size*.88,fl.size*.92,fl.size*.15); ctx.fill();
  // Brillo
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.roundRect(-fl.size*.36,-fl.size*.48,fl.size*.72,fl.size*.30,fl.size*.12); ctx.fill();
  // Borde
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2.5; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.roundRect(-fl.size*.44,-fl.size*.52,fl.size*.88,fl.size*.92,fl.size*.15); ctx.stroke();
  // Letra — siempre derecha, siempre legible
  ctx.fillStyle='#fff';
  ctx.font=`bold ${fl.size*.72}px 'Fredoka One',cursive`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(fl.letter, 0, fl.size*.04);

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// PROYECTILES
// ═══════════════════════════════════════════════════════════
function shootProjectile(targetX,targetY){
  const isSlime=selectedChar==='monster';
  const laserColor=selectedChar==='astronaut'?'#00E5FF':'#FF1744';
  projectiles.push({
    x:W*.5+W*.04, y:H*.85-H*.12,
    tx:targetX, ty:targetY,
    progress:0, speed:isSlime?.055:.14,
    isSlime, laserColor, done:false
  });
  shootAnim=20;
}

function drawProjectiles(){
  projectiles.forEach(p=>{
    if(p.done) return;
    p.progress+=p.speed;
    if(p.progress>=1){p.done=true;return;}
    const t=p.progress;

    if(p.isSlime){
      // Arco parabólico para el slime
      const cx=(p.x+p.tx)/2, cy=Math.min(p.y,p.ty)-H*.20;
      const bx=(1-t)*(1-t)*p.x+2*(1-t)*t*cx+t*t*p.tx;
      const by=(1-t)*(1-t)*p.y+2*(1-t)*t*cy+t*t*p.ty;
      ctx.save();
      ctx.shadowColor='rgba(100,200,50,0.6)'; ctx.shadowBlur=12;
      ctx.fillStyle=`rgba(100,210,50,${.95-t*.25})`;
      ctx.beginPath(); ctx.arc(bx,by,11,0,Math.PI*2); ctx.fill();
      // Brillo del blob
      ctx.fillStyle='rgba(180,255,120,0.7)';
      ctx.beginPath(); ctx.arc(bx-3,by-3,4,0,Math.PI*2); ctx.fill();
      // Gotas en la estela
      if(Math.random()<.4){
        ctx.globalAlpha=.5;
        ctx.fillStyle='#8BC34A';
        ctx.beginPath(); ctx.arc(bx+(Math.random()-.5)*16,by+Math.random()*14,3,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    } else {
      // Rayo láser recto
      const bx=p.x+(p.tx-p.x)*t;
      const by=p.y+(p.ty-p.y)*t;
      const trail=.08;
      const bx2=p.x+(p.tx-p.x)*Math.max(0,t-trail);
      const by2=p.y+(p.ty-p.y)*Math.max(0,t-trail);
      ctx.save();
      // Halo
      ctx.strokeStyle=p.laserColor+'44'; ctx.lineWidth=12;
      ctx.shadowColor=p.laserColor; ctx.shadowBlur=22;
      ctx.beginPath(); ctx.moveTo(bx2,by2); ctx.lineTo(bx,by); ctx.stroke();
      // Núcleo brillante
      ctx.strokeStyle=p.laserColor; ctx.lineWidth=4; ctx.shadowBlur=16;
      ctx.beginPath(); ctx.moveTo(bx2,by2); ctx.lineTo(bx,by); ctx.stroke();
      // Línea blanca central
      ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=1.5; ctx.shadowBlur=0;
      ctx.beginPath(); ctx.moveTo(bx2,by2); ctx.lineTo(bx,by); ctx.stroke();
      // Punto de impacto
      ctx.fillStyle='#fff'; ctx.shadowBlur=8; ctx.shadowColor=p.laserColor;
      ctx.beginPath(); ctx.arc(bx,by,5,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  });
  projectiles=projectiles.filter(p=>!p.done);
}

// ═══════════════════════════════════════════════════════════
// EFECTOS
// ═══════════════════════════════════════════════════════════
function spawnParticles(x,y,color){
  const isSlime=selectedChar==='monster';
  for(let i=0;i<16;i++){
    const angle=Math.random()*Math.PI*2, dist=25+Math.random()*60, sz=6+Math.random()*11;
    const el=document.createElement('div');
    el.className='particle';
    const pcolor=isSlime?`hsl(${95+Math.random()*45},72%,48%)`:color;
    const br=isSlime?'40% 60% 55% 45%':'50%';
    el.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${pcolor};border-radius:${br};animation-duration:${.45+Math.random()*.5}s;transform:translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) scale(0);`;
    document.body.appendChild(el);
  }
  setTimeout(()=>document.querySelectorAll('.particle').forEach(p=>p.remove()),900);
}

function showHitMsg(x,y,text){
  const d=document.createElement('div');
  d.className='hit-msg'; d.textContent=text;
  d.style.left=(x-45)+'px'; d.style.top=(y-65)+'px';
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),900);
}

// ═══════════════════════════════════════════════════════════
// LÓGICA
// ═══════════════════════════════════════════════════════════
function handleKey(e){
  if(!gameRunning||e.repeat) return;
  const key=e.key.toUpperCase();
  if(key.length!==1||!LETTERS.includes(key)) return;
  let lowest=null;
  fallingLetters.forEach(fl=>{
    if(!fl.hit&&fl.letter===key){ if(!lowest||fl.y>lowest.y) lowest=fl; }
  });
  if(lowest){
    lowest.hit=true; lowest.hitAnim=0;
    score+=10; updateHUD();
    shootProjectile(lowest.x,lowest.y);
    spawnParticles(lowest.x,lowest.y,lowest.color);
    showHitMsg(lowest.x,lowest.y,'+10 ⭐');
    checkLevelUp();
  }
}

function checkLevelUp(){
  const nl=Math.floor(score/100)+1;
  if(nl>level){
    level=nl;
    letterSpeed=1.2+(level-1)*.25;
    spawnInterval=Math.max(40,90-(level-1)*10);
    document.getElementById('level-num').textContent=level;
    showHitMsg(W/2,H*.30,`🚀 ¡Nivel ${level}!`);
  }
}

function letterMissed(){ lives--; updateHUD(); if(lives<=0) gameOver(); }

function updateHUD(){
  document.getElementById('score-display').textContent=score;
  const h=['💀','❤️','❤️❤️','❤️❤️❤️'];
  document.getElementById('lives-display').textContent=h[Math.max(0,lives)];
}

function gameOver(){
  gameRunning=false;
  document.getElementById('final-score').textContent=score;
  const emoji=document.getElementById('gameover-emoji');
  const title=document.getElementById('gameover-title');
  const msg=document.getElementById('gameover-msg');
  if(score>=150){emoji.textContent='🏆';title.textContent='¡Increíble!';msg.textContent='¡Sos un maestro del teclado!';}
  else if(score>=80){emoji.textContent='⭐';title.textContent='¡Muy bien!';msg.textContent='¡Seguí así, campeón!';}
  else if(score>=30){emoji.textContent='😊';title.textContent='¡Buen intento!';msg.textContent='¡Con práctica vas a mejorar mucho!';}
  else{emoji.textContent='💪';title.textContent='¡A practicar!';msg.textContent='¡Inténtalo de nuevo!';}
  document.getElementById('screen-game').classList.add('hidden');
  document.getElementById('screen-gameover').classList.remove('hidden');
}

// ═══════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════
let animId;
function gameLoop(){
  if(!gameRunning) return;
  ctx.clearRect(0,0,W,H);
  drawBG();

  for(let i=fallingLetters.length-1;i>=0;i--){
    const fl=fallingLetters[i];
    if(!fl.hit){
      fl.y+=fl.speed;
      if(fl.y>H*.81){ letterMissed(); fallingLetters.splice(i,1); continue; }
    } else {
      fl.hitAnim+=.09;
      if(fl.hitAnim>=1){ fallingLetters.splice(i,1); continue; }
    }
    drawFallingLetter(fl);
  }

  frameCount++;
  if(frameCount-lastSpawnFrame>=spawnInterval){ spawnLetter(); lastSpawnFrame=frameCount; }

  drawProjectiles();
  drawCharacter(W*.5,H*.85);
  animId=requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════════════════
// PANTALLAS
// ═══════════════════════════════════════════════════════════
function startGame(char){
  selectedChar=char; score=0; lives=3; level=1;
  letterSpeed=1.2; spawnInterval=90;
  fallingLetters=[]; projectiles=[];
  frameCount=0; lastSpawnFrame=0; shootAnim=0;
  updateHUD();
  document.getElementById('level-num').textContent='1';
  document.getElementById('screen-start').classList.add('hidden');
  document.getElementById('screen-gameover').classList.add('hidden');
  document.getElementById('screen-game').classList.remove('hidden');
  gameRunning=true;
  if(animId) cancelAnimationFrame(animId);
  gameLoop();
}

function showStart(){
  gameRunning=false;
  document.getElementById('screen-gameover').classList.add('hidden');
  document.getElementById('screen-game').classList.add('hidden');
  document.getElementById('screen-start').classList.remove('hidden');
}

document.addEventListener('keydown',handleKey);
window.addEventListener('load',drawPreviews);
</script>
