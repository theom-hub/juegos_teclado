<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Teclado Aventura! 🎮</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');

  :root {
    --sky: #87CEEB;
    --grass: #4CAF50;
    --dark-grass: #388E3C;
    --ground: #8B6914;
    --sun: #FFD700;
    --flower1: #FF69B4;
    --flower2: #FF6347;
    --flower3: #9370DB;
    --letter-color: #FF4500;
    --letter-shadow: #B22200;
    --score-bg: rgba(255,255,255,0.85);
    --hit-color: #FFD700;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    background: var(--sky);
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  /* ========== PANTALLAS ========== */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .screen.hidden { display: none; }

  /* ---- PANTALLA INICIO ---- */
  #screen-start {
    background: linear-gradient(180deg, #87CEEB 0%, #b0e0ff 60%, #7ec850 60%, #4CAF50 100%);
  }

  .title-box {
    background: rgba(255,255,255,0.92);
    border-radius: 30px;
    padding: 30px 50px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    text-align: center;
    margin-bottom: 40px;
    border: 4px solid #FFD700;
  }
  .title-box h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 3.5rem;
    color: #FF4500;
    text-shadow: 3px 3px 0 #FFD700;
    line-height: 1;
  }
  .title-box p {
    font-size: 1.3rem;
    color: #555;
    margin-top: 8px;
    font-weight: 700;
  }

  .char-selection {
    display: flex;
    gap: 50px;
    margin-bottom: 30px;
  }

  .char-card {
    background: rgba(255,255,255,0.92);
    border-radius: 24px;
    padding: 24px 36px;
    cursor: pointer;
    text-align: center;
    border: 4px solid transparent;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    min-width: 160px;
  }
  .char-card:hover {
    transform: translateY(-8px) scale(1.05);
    border-color: #FFD700;
    box-shadow: 0 12px 30px rgba(0,0,0,0.22);
  }
  .char-card .emoji { font-size: 5rem; line-height: 1; }
  .char-card h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    margin-top: 10px;
    color: #333;
  }

  .instruction {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    color: #fff;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.07); }
  }

  /* ---- PANTALLA JUEGO ---- */
  #screen-game {
    background: none;
    position: relative;
  }

  /* Canvas del juego */
  #gameCanvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  /* HUD */
  #hud {
    position: absolute;
    top: 20px;
    right: 24px;
    background: var(--score-bg);
    border-radius: 18px;
    padding: 12px 24px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    border: 3px solid #FFD700;
    text-align: center;
    min-width: 130px;
  }
  #hud .label {
    font-size: 0.9rem;
    font-weight: 800;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #hud .score-val {
    font-family: 'Fredoka One', cursive;
    font-size: 2.8rem;
    color: #FF4500;
    line-height: 1;
  }
  #hud .lives {
    font-size: 1.5rem;
    margin-top: 4px;
  }

  #level-display {
    position: absolute;
    top: 20px;
    left: 24px;
    background: var(--score-bg);
    border-radius: 18px;
    padding: 12px 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    border: 3px solid #4CAF50;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: #388E3C;
  }

  /* Letra a tipear resaltada */
  #next-letter-hint {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.93);
    border-radius: 50%;
    width: 90px;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    color: #FF4500;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    border: 4px solid #FFD700;
    display: none;
  }

  /* ---- PANTALLA GAME OVER ---- */
  #screen-gameover {
    background: linear-gradient(180deg, #87CEEB 0%, #b0e0ff 60%, #7ec850 60%, #4CAF50 100%);
  }

  .gameover-box {
    background: rgba(255,255,255,0.95);
    border-radius: 30px;
    padding: 40px 60px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    border: 4px solid #FFD700;
    max-width: 500px;
  }
  .gameover-box h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    color: #FF4500;
    text-shadow: 2px 2px 0 #FFD700;
  }
  .gameover-box .final-score {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    color: #333;
    margin: 16px 0;
  }
  .gameover-box .final-score span {
    color: #4CAF50;
    font-size: 3rem;
  }
  .gameover-box .emoji-big { font-size: 4rem; margin-bottom: 10px; display: block; }

  .btn-play {
    background: linear-gradient(135deg, #4CAF50, #388E3C);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(76,175,80,0.5);
    transition: transform 0.15s, box-shadow 0.15s;
    margin-top: 20px;
  }
  .btn-play:hover {
    transform: scale(1.07);
    box-shadow: 0 10px 28px rgba(76,175,80,0.6);
  }

  /* Mensaje flotante de hit */
  .hit-msg {
    position: absolute;
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: #FFD700;
    text-shadow: 2px 2px 0 #FF4500;
    pointer-events: none;
    animation: floatUp 0.9s ease-out forwards;
    z-index: 999;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.4); }
  }

  /* Partículas */
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: particleAnim 0.8s ease-out forwards;
    z-index: 999;
  }
  @keyframes particleAnim {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0) translateY(-30px); }
  }
</style>
</head>
<body>

<!-- PANTALLA DE INICIO -->
<div id="screen-start" class="screen">
  <div class="title-box">
    <h1>⌨️ Teclado Aventura!</h1>
    <p>Aprende el teclado jugando 🎉</p>
  </div>
  <p class="instruction" style="margin-bottom:24px; color:#333; text-shadow:1px 1px 3px rgba(255,255,255,0.8);">¡Elige tu personaje!</p>
  <div class="char-selection">
    <div class="char-card" onclick="startGame('boy')">
      <div class="emoji">👦</div>
      <h3>Niño</h3>
    </div>
    <div class="char-card" onclick="startGame('girl')">
      <div class="emoji">👧</div>
      <h3>Niña</h3>
    </div>
  </div>
  <p class="instruction">¡Apreta las letras que caen!</p>
</div>

<!-- PANTALLA DE JUEGO -->
<div id="screen-game" class="screen hidden">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div class="label">Puntos</div>
    <div class="score-val" id="score-display">0</div>
    <div class="lives" id="lives-display">❤️❤️❤️</div>
  </div>
  <div id="level-display">⭐ Nivel <span id="level-num">1</span></div>
</div>

<!-- PANTALLA GAME OVER -->
<div id="screen-gameover" class="screen hidden">
  <div class="gameover-box">
    <span class="emoji-big" id="gameover-emoji">🎉</span>
    <h2 id="gameover-title">¡Fin del juego!</h2>
    <div class="final-score">Tu puntaje: <span id="final-score">0</span></div>
    <p style="color:#666; font-size:1.1rem;" id="gameover-msg">¡Sigue practicando!</p>
    <button class="btn-play" onclick="showStart()">🏠 Volver al inicio</button>
  </div>
</div>

<script>
// ====================================================
// CONFIGURACIÓN Y ESTADO
// ====================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); });

let selectedChar = 'boy';
let score = 0;
let lives = 3;
let level = 1;
let fallingLetters = [];
let particles = [];
let slingshots = [];   // animaciones de resortera
let gameRunning = false;
let frameCount = 0;
let spawnInterval = 90; // frames between spawns
let letterSpeed = 1.2;
let lastSpawnFrame = 0;

// ====================================================
// DIBUJO DEL ESCENARIO (JARDÍN)
// ====================================================

// Nubes
const clouds = [
  {x: 0.1, y: 0.08, s: 1.2},
  {x: 0.35, y: 0.05, s: 0.9},
  {x: 0.6, y: 0.10, s: 1.4},
  {x: 0.82, y: 0.06, s: 1.0},
];

// Flores (generadas al cargar)
const flowerColors = ['#FF69B4','#FF6347','#9370DB','#FF8C00','#FF1493'];
const flowers = [];
function generateFlowers() {
  flowers.length = 0;
  for (let i = 0; i < 28; i++) {
    flowers.push({
      x: (i / 27) * 1.05 - 0.02 + (Math.random() - 0.5) * 0.03,
      yOff: Math.random() * 0.03,
      color: flowerColors[Math.floor(Math.random() * flowerColors.length)],
      size: 0.012 + Math.random() * 0.008,
      type: Math.floor(Math.random() * 3)
    });
  }
}
generateFlowers();

// Árboles
const trees = [
  {x: 0.05, size: 0.18},
  {x: 0.88, size: 0.20},
  {x: 0.78, size: 0.15},
];

function drawBackground() {
  // Cielo degradado
  let sky = ctx.createLinearGradient(0, 0, 0, H * 0.62);
  sky.addColorStop(0, '#5BC8F5');
  sky.addColorStop(1, '#CCF0FF');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H * 0.62);

  // Sol
  const sunX = W * 0.88, sunY = H * 0.12, sunR = W * 0.055;
  ctx.save();
  // Rayos
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 3;
  for (let i = 0; i < 12; i++) {
    const ang = (i / 12) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(sunX + Math.cos(ang) * sunR * 1.2, sunY + Math.sin(ang) * sunR * 1.2);
    ctx.lineTo(sunX + Math.cos(ang) * sunR * 1.7, sunY + Math.sin(ang) * sunR * 1.7);
    ctx.stroke();
  }
  // Círculo
  let sunGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunR);
  sunGrad.addColorStop(0, '#FFF176');
  sunGrad.addColorStop(1, '#FFD700');
  ctx.fillStyle = sunGrad;
  ctx.beginPath();
  ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
  ctx.fill();
  // Cara del sol
  ctx.fillStyle = '#FF8F00';
  ctx.font = `${sunR * 1.1}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('😊', sunX, sunY);
  ctx.restore();

  // Nubes
  clouds.forEach(c => {
    drawCloud(W * c.x, H * c.y, c.s);
  });

  // Montañas de fondo (suaves)
  ctx.fillStyle = '#90D870';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.55);
  ctx.bezierCurveTo(W*0.2, H*0.38, W*0.4, H*0.45, W*0.5, H*0.42);
  ctx.bezierCurveTo(W*0.6, H*0.39, W*0.8, H*0.50, W, H*0.50);
  ctx.lineTo(W, H * 0.62);
  ctx.lineTo(0, H * 0.62);
  ctx.closePath();
  ctx.fill();

  // Pasto principal
  let grassGrad = ctx.createLinearGradient(0, H * 0.60, 0, H);
  grassGrad.addColorStop(0, '#66BB6A');
  grassGrad.addColorStop(0.3, '#4CAF50');
  grassGrad.addColorStop(1, '#388E3C');
  ctx.fillStyle = grassGrad;
  ctx.fillRect(0, H * 0.60, W, H * 0.40);

  // Franja oscura de tierra
  ctx.fillStyle = '#5D4037';
  ctx.fillRect(0, H * 0.90, W, H * 0.10);

  // Camino
  ctx.fillStyle = '#D7B88A';
  ctx.beginPath();
  ctx.moveTo(W * 0.35, H * 0.60);
  ctx.lineTo(W * 0.65, H * 0.60);
  ctx.lineTo(W * 0.72, H);
  ctx.lineTo(W * 0.28, H);
  ctx.closePath();
  ctx.fill();
  // Línea del camino
  ctx.strokeStyle = '#C8A96E';
  ctx.lineWidth = 3;
  ctx.setLineDash([20, 20]);
  ctx.beginPath();
  ctx.moveTo(W * 0.50, H * 0.62);
  ctx.lineTo(W * 0.50, H * 0.93);
  ctx.stroke();
  ctx.setLineDash([]);

  // Árboles
  trees.forEach(t => drawTree(W * t.x, H * 0.62, t.size));

  // Flores
  flowers.forEach(f => {
    const gy = H * (0.62 + f.yOff);
    drawFlower(W * f.x, gy + H * 0.03, W * f.size, f.color, f.type);
  });

  // Arbusto decorativo
  drawBush(W * 0.15, H * 0.72);
  drawBush(W * 0.72, H * 0.70);
}

function drawCloud(x, y, s) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.shadowColor = 'rgba(100,180,255,0.3)';
  ctx.shadowBlur = 10;
  const r = 28 * s;
  [[0,0],[r*0.8,r*0.2],[r*1.6,0],[r*0.8,-r*0.3],[r*0.4,-r*0.35]].forEach(([dx,dy]) => {
    ctx.beginPath();
    ctx.arc(x + dx - r * 0.8, y + dy, r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.restore();
}

function drawTree(x, y, size) {
  const tw = W * size;
  const th = H * size * 1.8;
  // Tronco
  ctx.fillStyle = '#795548';
  ctx.fillRect(x - tw * 0.1, y - th * 0.4, tw * 0.2, th * 0.4);
  // Copa (3 círculos)
  const leafColors = ['#388E3C','#4CAF50','#66BB6A'];
  [[0, -th*0.65, tw*0.55],[- tw*0.3, -th*0.45, tw*0.42],[tw*0.3, -th*0.48, tw*0.42]].forEach(([dx, dy, r], i) => {
    let g = ctx.createRadialGradient(x+dx, y+dy, 0, x+dx, y+dy, r);
    g.addColorStop(0, '#81C784');
    g.addColorStop(1, leafColors[i]);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x + dx, y + dy, r, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawFlower(x, y, size, color, type) {
  const r = size;
  ctx.save();
  // Tallo
  ctx.strokeStyle = '#388E3C';
  ctx.lineWidth = r * 0.3;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x, y + r * 2.5);
  ctx.stroke();
  // Pétalos
  const petals = type === 0 ? 5 : type === 1 ? 6 : 4;
  for (let i = 0; i < petals; i++) {
    const ang = (i / petals) * Math.PI * 2;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(x + Math.cos(ang) * r, y + Math.sin(ang) * r, r * 0.7, r * 0.4, ang, 0, Math.PI * 2);
    ctx.fill();
  }
  // Centro
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(x, y, r * 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBush(x, y) {
  const r = W * 0.035;
  ctx.fillStyle = '#388E3C';
  [[-r*0.5, 0, r],[r*0.5, 0, r*0.9],[0, -r*0.4, r*0.8]].forEach(([dx,dy,rad]) => {
    ctx.beginPath();
    ctx.arc(x+dx, y+dy, rad, 0, Math.PI*2);
    ctx.fill();
  });
}

// ====================================================
// PERSONAJE Y RESORTERA
// ====================================================
let charAnim = 0;
let shootAnim = 0; // frames restantes de animación de disparo

function drawCharacter(x, y) {
  const charSize = H * 0.18;
  charAnim += 0.05;
  const bob = Math.sin(charAnim) * 3;

  ctx.save();
  ctx.translate(x, y + bob);

  if (selectedChar === 'boy') {
    drawBoyCharacter(charSize, shootAnim > 0);
  } else {
    drawGirlCharacter(charSize, shootAnim > 0);
  }

  ctx.restore();
  if (shootAnim > 0) shootAnim--;
}

function drawBoyCharacter(size, shooting) {
  const s = size;
  // Sombra
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(0, s*0.05, s*0.35, s*0.08, 0, 0, Math.PI*2);
  ctx.fill();

  // Zapatos
  ctx.fillStyle = '#5D4037';
  ctx.beginPath(); ctx.ellipse(-s*0.17, s*0, s*0.12, s*0.05, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*0.05, s*0, s*0.12, s*0.05, 0, 0, Math.PI*2); ctx.fill();

  // Piernas
  ctx.fillStyle = '#1565C0';
  ctx.fillRect(-s*0.22, -s*0.45, s*0.18, s*0.5);
  ctx.fillRect(-s*0.02, -s*0.45, s*0.18, s*0.5);

  // Cuerpo (camisa)
  ctx.fillStyle = '#FF7043';
  ctx.beginPath();
  ctx.roundRect(-s*0.28, -s*0.85, s*0.56, s*0.45, s*0.08);
  ctx.fill();

  // Brazos
  ctx.fillStyle = '#FF7043';
  if (shooting) {
    // Brazo disparando hacia arriba-derecha
    ctx.fillRect(-s*0.38, -s*0.8, s*0.12, s*0.35);
    ctx.fillRect(s*0.2, -s*0.95, s*0.12, s*0.35);
  } else {
    ctx.fillRect(-s*0.38, -s*0.8, s*0.12, s*0.35);
    ctx.fillRect(s*0.26, -s*0.8, s*0.12, s*0.35);
  }

  // Cabeza
  ctx.fillStyle = '#FFCC80';
  ctx.beginPath();
  ctx.arc(0, -s*0.95, s*0.22, 0, Math.PI*2);
  ctx.fill();

  // Pelo (niño)
  ctx.fillStyle = '#4E342E';
  ctx.beginPath();
  ctx.arc(0, -s*1.1, s*0.22, Math.PI, 0);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(-s*0.18, -s*0.9, s*0.08, 0, Math.PI*2);
  ctx.fill();

  // Ojos
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(-s*0.08, -s*0.97, s*0.035, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.08, -s*0.97, s*0.035, 0, Math.PI*2); ctx.fill();

  // Brillo ojos
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*0.065, -s*0.98, s*0.012, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.095, -s*0.98, s*0.012, 0, Math.PI*2); ctx.fill();

  // Boca sonriente
  ctx.strokeStyle = '#333';
  ctx.lineWidth = s * 0.025;
  ctx.beginPath();
  ctx.arc(0, -s*0.9, s*0.07, 0.2, Math.PI - 0.2);
  ctx.stroke();

  // Resortera
  drawSlingshot(shooting, s);
}

function drawGirlCharacter(size, shooting) {
  const s = size;
  // Sombra
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(0, s*0.05, s*0.35, s*0.08, 0, 0, Math.PI*2);
  ctx.fill();

  // Zapatos (rosa)
  ctx.fillStyle = '#E91E63';
  ctx.beginPath(); ctx.ellipse(-s*0.17, s*0, s*0.12, s*0.05, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*0.05, s*0, s*0.12, s*0.05, 0, 0, Math.PI*2); ctx.fill();

  // Piernas
  ctx.fillStyle = '#F48FB1';
  ctx.fillRect(-s*0.22, -s*0.45, s*0.18, s*0.5);
  ctx.fillRect(-s*0.02, -s*0.45, s*0.18, s*0.5);

  // Falda
  ctx.fillStyle = '#E91E63';
  ctx.beginPath();
  ctx.moveTo(-s*0.32, -s*0.5);
  ctx.lineTo(s*0.32, -s*0.5);
  ctx.lineTo(s*0.38, -s*0.38);
  ctx.lineTo(-s*0.38, -s*0.38);
  ctx.closePath();
  ctx.fill();

  // Cuerpo (blusa)
  ctx.fillStyle = '#CE93D8';
  ctx.beginPath();
  ctx.roundRect(-s*0.25, -s*0.88, s*0.50, s*0.42, s*0.08);
  ctx.fill();

  // Brazos
  ctx.fillStyle = '#CE93D8';
  if (shooting) {
    ctx.fillRect(-s*0.35, -s*0.82, s*0.12, s*0.32);
    ctx.fillRect(s*0.2, -s*0.95, s*0.12, s*0.35);
  } else {
    ctx.fillRect(-s*0.35, -s*0.82, s*0.12, s*0.32);
    ctx.fillRect(s*0.23, -s*0.82, s*0.12, s*0.32);
  }

  // Cabeza
  ctx.fillStyle = '#FFCC80';
  ctx.beginPath();
  ctx.arc(0, -s*0.97, s*0.22, 0, Math.PI*2);
  ctx.fill();

  // Pelo (coletas)
  ctx.fillStyle = '#4E342E';
  ctx.beginPath();
  ctx.arc(0, -s*1.12, s*0.24, Math.PI, 0);
  ctx.fill();
  // Coleta izq
  ctx.fillStyle = '#E91E63';
  ctx.beginPath();
  ctx.arc(-s*0.28, -s*0.97, s*0.09, 0, Math.PI*2);
  ctx.fill();
  // Coleta der
  ctx.beginPath();
  ctx.arc(s*0.28, -s*0.97, s*0.09, 0, Math.PI*2);
  ctx.fill();

  // Ojos
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(-s*0.08, -s*0.99, s*0.035, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.08, -s*0.99, s*0.035, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*0.065, -s*1.0, s*0.012, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.095, -s*1.0, s*0.012, 0, Math.PI*2); ctx.fill();

  // Pestañas
  ctx.strokeStyle = '#333';
  ctx.lineWidth = s * 0.02;
  [[-s*0.12, -s*1.03],[-s*0.08,-s*1.05],[-s*0.04,-s*1.03]].forEach(([ex, ey]) => {
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex, ey - s*0.04);
    ctx.stroke();
  });

  // Boca
  ctx.strokeStyle = '#333';
  ctx.lineWidth = s * 0.025;
  ctx.beginPath();
  ctx.arc(0, -s*0.92, s*0.07, 0.2, Math.PI - 0.2);
  ctx.stroke();

  drawSlingshot(shooting, s);
}

function drawSlingshot(shooting, s) {
  // La resortera siempre está en la mano derecha
  const hx = s * 0.32, hy = -s * 0.72;
  ctx.save();
  ctx.translate(hx, hy);

  // Palo en Y
  ctx.strokeStyle = '#795548';
  ctx.lineWidth = s * 0.04;
  ctx.lineCap = 'round';

  // Mango
  ctx.beginPath();
  ctx.moveTo(0, s*0.1);
  ctx.lineTo(0, -s*0.05);
  ctx.stroke();

  // Bifurcación
  ctx.beginPath();
  ctx.moveTo(0, -s*0.05);
  ctx.lineTo(-s*0.12, -s*0.22);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, -s*0.05);
  ctx.lineTo(s*0.12, -s*0.22);
  ctx.stroke();

  if (shooting) {
    // Banda estirada
    ctx.strokeStyle = '#795548';
    ctx.lineWidth = s * 0.025;
    ctx.beginPath();
    ctx.moveTo(-s*0.12, -s*0.22);
    ctx.lineTo(0, -s*0.28);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(s*0.12, -s*0.22);
    ctx.lineTo(0, -s*0.28);
    ctx.stroke();
    // Piedra (la bala)
    ctx.fillStyle = '#607D8B';
    ctx.beginPath();
    ctx.arc(0, -s*0.28, s*0.04, 0, Math.PI*2);
    ctx.fill();
  } else {
    // Banda en reposo
    ctx.strokeStyle = '#A1887F';
    ctx.lineWidth = s * 0.02;
    ctx.beginPath();
    ctx.moveTo(-s*0.12, -s*0.22);
    ctx.lineTo(0, -s*0.15);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(s*0.12, -s*0.22);
    ctx.lineTo(0, -s*0.15);
    ctx.stroke();
  }

  ctx.restore();
}

// ====================================================
// LETRAS QUE CAEN
// ====================================================
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const colors = [
  '#FF4500','#1565C0','#2E7D32','#6A1B9A','#F57F17','#00838F','#AD1457','#4E342E'
];

function spawnLetter() {
  const letter = LETTERS[Math.floor(Math.random() * LETTERS.length)];
  const color = colors[Math.floor(Math.random() * colors.length)];
  const x = W * 0.12 + Math.random() * W * 0.76;
  fallingLetters.push({
    letter, color,
    x, y: -60,
    speed: letterSpeed + Math.random() * 0.5,
    size: H * 0.075,
    rotation: (Math.random() - 0.5) * 0.4,
    rotSpeed: (Math.random() - 0.5) * 0.02,
    hit: false,
    hitAnim: 0,
  });
}

function drawFallingLetter(fl) {
  ctx.save();
  ctx.translate(fl.x, fl.y);
  ctx.rotate(fl.rotation);

  if (fl.hit) {
    // Animación de impacto: escala y desaparece
    const sc = 1 + fl.hitAnim * 0.3;
    ctx.scale(sc, sc);
    ctx.globalAlpha = 1 - fl.hitAnim;
  }

  // Sombra de la letra
  ctx.shadowColor = 'rgba(0,0,0,0.35)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetY = 4;

  // Fondo de la letra (burbuja)
  ctx.fillStyle = fl.color;
  ctx.beginPath();
  ctx.roundRect(-fl.size * 0.42, -fl.size * 0.5, fl.size * 0.84, fl.size * 0.9, fl.size * 0.14);
  ctx.fill();

  // Borde
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Letra
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${fl.size * 0.75}px 'Fredoka One', cursive`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(fl.letter, 0, fl.size * 0.05);

  ctx.restore();
}

// ====================================================
// PROYECTIL DE RESORTERA
// ====================================================
let projectiles = [];

function shootProjectile(targetX, targetY) {
  const charX = W * 0.5;
  const charY = H * 0.82;
  projectiles.push({
    x: charX + W * 0.05,
    y: charY - H * 0.08,
    tx: targetX,
    ty: targetY,
    progress: 0,
    speed: 0.08,
    done: false
  });
  shootAnim = 15;
}

function drawProjectiles() {
  projectiles.forEach(p => {
    if (p.done) return;
    p.progress += p.speed;
    if (p.progress >= 1) { p.done = true; return; }
    // Arco parabólico
    const t = p.progress;
    const cx = (p.x + p.tx) / 2;
    const cy = Math.min(p.y, p.ty) - H * 0.15;
    const bx = (1-t)*(1-t)*p.x + 2*(1-t)*t*cx + t*t*p.tx;
    const by = (1-t)*(1-t)*p.y + 2*(1-t)*t*cy + t*t*p.ty;
    ctx.fillStyle = '#607D8B';
    ctx.beginPath();
    ctx.arc(bx, by, 7, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#90A4AE';
    ctx.beginPath();
    ctx.arc(bx - 2, by - 2, 3, 0, Math.PI*2);
    ctx.fill();
  });
  projectiles = projectiles.filter(p => !p.done);
}

// ====================================================
// PARTÍCULAS
// ====================================================
function spawnParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    document.body.insertAdjacentHTML('beforeend', `
      <div class="particle" style="
        left:${x}px; top:${y}px;
        width:${8+Math.random()*8}px;
        height:${8+Math.random()*8}px;
        background:${color};
        animation-duration:${0.5 + Math.random()*0.5}s;
        transform:translate(${Math.cos(angle)*speed*10}px,${Math.sin(angle)*speed*10}px) scale(0);
      "></div>
    `);
  }
  setTimeout(() => {
    document.querySelectorAll('.particle').forEach(p => p.remove());
  }, 1000);
}

function showHitMessage(x, y, text) {
  const div = document.createElement('div');
  div.className = 'hit-msg';
  div.textContent = text;
  div.style.left = (x - 40) + 'px';
  div.style.top = (y - 60) + 'px';
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 900);
}

// ====================================================
// LÓGICA DEL JUEGO
// ====================================================
function handleKey(e) {
  if (!gameRunning) return;
  const key = e.key.toUpperCase();
  if (key.length !== 1 || !LETTERS.includes(key)) return;

  // Buscar la letra más baja (más urgente)
  let lowest = null;
  fallingLetters.forEach(fl => {
    if (!fl.hit && fl.letter === key) {
      if (!lowest || fl.y > lowest.y) lowest = fl;
    }
  });

  if (lowest) {
    lowest.hit = true;
    lowest.hitAnim = 0;
    score += 10;
    updateHUD();
    shootProjectile(lowest.x, lowest.y);
    spawnParticles(lowest.x, lowest.y, lowest.color);
    showHitMessage(lowest.x, lowest.y, '+10 ⭐');
    checkLevelUp();
  }
}

function checkLevelUp() {
  const newLevel = Math.floor(score / 100) + 1;
  if (newLevel > level) {
    level = newLevel;
    letterSpeed = 1.2 + (level - 1) * 0.25;
    spawnInterval = Math.max(45, 90 - (level - 1) * 10);
    document.getElementById('level-num').textContent = level;
    showHitMessage(W / 2, H * 0.35, `⬆️ Nivel ${level}!`);
  }
}

function letterMissed(fl) {
  lives--;
  updateHUD();
  if (lives <= 0) {
    gameOver();
  }
}

function updateHUD() {
  document.getElementById('score-display').textContent = score;
  const heartsArr = ['','❤️','❤️❤️','❤️❤️❤️'];
  document.getElementById('lives-display').textContent = heartsArr[Math.max(0, lives)] || '💀';
}

function gameOver() {
  gameRunning = false;
  const finalEl = document.getElementById('final-score');
  finalEl.textContent = score;
  const emoji = document.getElementById('gameover-emoji');
  const msg = document.getElementById('gameover-msg');
  if (score >= 100) {
    emoji.textContent = '🏆';
    document.getElementById('gameover-title').textContent = '¡Excelente!';
    msg.textContent = '¡Eres un campeón del teclado!';
  } else if (score >= 50) {
    emoji.textContent = '⭐';
    document.getElementById('gameover-title').textContent = '¡Muy bien!';
    msg.textContent = '¡Sigue practicando!';
  } else {
    emoji.textContent = '💪';
    document.getElementById('gameover-title').textContent = '¡Buen intento!';
    msg.textContent = '¡Inténtalo de nuevo!';
  }
  document.getElementById('screen-game').classList.add('hidden');
  document.getElementById('screen-gameover').classList.remove('hidden');
}

// ====================================================
// GAME LOOP
// ====================================================
let animId;
function gameLoop() {
  if (!gameRunning) return;
  ctx.clearRect(0, 0, W, H);

  drawBackground();

  // Letras
  for (let i = fallingLetters.length - 1; i >= 0; i--) {
    const fl = fallingLetters[i];
    if (!fl.hit) {
      fl.y += fl.speed;
      fl.rotation += fl.rotSpeed;
      if (fl.y > H * 0.82) {
        // Llegó al suelo sin ser golpeada
        letterMissed(fl);
        fallingLetters.splice(i, 1);
        continue;
      }
    } else {
      fl.hitAnim += 0.08;
      if (fl.hitAnim >= 1) {
        fallingLetters.splice(i, 1);
        continue;
      }
    }
    drawFallingLetter(fl);
  }

  // Spawn
  frameCount++;
  if (frameCount - lastSpawnFrame >= spawnInterval) {
    spawnLetter();
    lastSpawnFrame = frameCount;
  }

  // Proyectiles
  drawProjectiles();

  // Personaje
  drawCharacter(W * 0.5, H * 0.85);

  animId = requestAnimationFrame(gameLoop);
}

// ====================================================
// CONTROL DE PANTALLAS
// ====================================================
function startGame(char) {
  selectedChar = char;
  score = 0;
  lives = 3;
  level = 1;
  letterSpeed = 1.2;
  spawnInterval = 90;
  fallingLetters = [];
  projectiles = [];
  frameCount = 0;
  lastSpawnFrame = 0;
  shootAnim = 0;

  updateHUD();
  document.getElementById('level-num').textContent = '1';

  document.getElementById('screen-start').classList.add('hidden');
  document.getElementById('screen-gameover').classList.add('hidden');
  document.getElementById('screen-game').classList.remove('hidden');

  gameRunning = true;
  if (animId) cancelAnimationFrame(animId);
  gameLoop();
}

function showStart() {
  gameRunning = false;
  document.getElementById('screen-gameover').classList.add('hidden');
  document.getElementById('screen-game').classList.add('hidden');
  document.getElementById('screen-start').classList.remove('hidden');
}

// Eventos teclado
document.addEventListener('keydown', handleKey);

// Pantalla de inicio animada (sol y nubes)
(function startScreenAnim() {
  // Solo anima si la pantalla de inicio tiene un canvas propio... 
  // En su lugar ya es CSS, ok.
})();
</script>
